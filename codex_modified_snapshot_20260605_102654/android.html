<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>フォークリフト後退接触 KY WebAR</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <div class="top-panel">
        <h1>フォークリフト後退接触<br class="sp" />KY WebAR</h1>
        <p>
          スマートフォンをゆっくり動かして床面を認識し、画面をタップしてモデルを配置してください。
          フォークリフトの後退動線、作業者の位置、危険エリアを確認できます。
        </p>
      </div>
      <div id="status" class="status">AR開始後、床や机などに向けてスマートフォンをゆっくり動かしてください。</div>
      <div class="bottom-panel">
        <button id="btnPlay" type="button">再生</button>
        <button id="btnPause" type="button">一時停止</button>
        <button id="btnReset" type="button">最初から</button>
        <button id="btnScaleUp" type="button">拡大</button>
        <button id="btnScaleDown" type="button">縮小</button>
        <button id="btnRotate" type="button">回転</button>
      </div>
      <div class="notice">DEMO版 / 労災KY教材モデル</div>
    </div>
  </div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
