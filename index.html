<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>フォークリフト接触事故 KY WebAR</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #fff;
      line-height: 1.7;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #1f2937;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    }

    h1 {
      margin-top: 0;
      font-size: 25px;
      line-height: 1.35;
    }

    h2 {
      font-size: 19px;
      margin-bottom: 8px;
    }

    p {
      color: #e5e7eb;
    }

    .button {
      display: block;
      text-align: center;
      padding: 16px 18px;
      margin-top: 14px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      background: #f97316;
    }

    .android {
      background: #2563eb;
    }

    .small {
      font-size: 13px;
      color: #cbd5e1;
    }

    .notice {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dc2626;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      const isIOS =
        /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      const isAndroid = /Android/.test(ua);

      const params = new URLSearchParams(window.location.search);
      const noRedirect = params.get("select") === "1";

      if (!noRedirect) {
        if (isIOS) {
          window.location.href = "./ios.html";
          return;
        }

        if (isAndroid) {
          window.location.href = "./android.html";
          return;
        }
      }

      const deviceText = document.getElementById("deviceText");

      if (deviceText) {
        if (isIOS) {
          deviceText.textContent = "iPhone / iPad と判定しました。iOS版をおすすめします。";
        } else if (isAndroid) {
          deviceText.textContent = "Android端末と判定しました。Android版をおすすめします。";
        } else {
          deviceText.textContent = "PCまたは判定できない端末です。下のボタンから選択してください。";
        }
      }
    });
  </script>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <div class="notice">DEMO版 / 労災KY教材モデル</div>
      <h1>フォークリフト接触事故<br>KY WebAR教材モデル</h1>
      <p>
        スマートフォンで、フォークリフト後退時の危険エリアや
        作業者との接触リスクを確認するAR教材デモです。
      </p>
      <p id="deviceText" class="small">
        端末を判定しています。
      </p>
    </section>

    <section class="card">
      <h2>iPhone / iPad の方</h2>
      <p>
        AR Quick Lookを使用して、iOS向けのAR表示を行います。
      </p>
      <a class="button" href="./ios.html">iOS版を開く</a>
    </section>

    <section class="card">
      <h2>Android の方</h2>
      <p>
        Three.js + WebXRを使用して、Android Chrome + ARCore対応端末でAR表示を行います。
      </p>
      <a class="button android" href="./android.html">Android版を開く</a>
      <p class="small">
        ※ Android版はWebXR対応端末向けです。
      </p>
    </section>
  </main>
</body>
</html>
