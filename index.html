<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>フォークリフト接触事故 KY WebAR</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!-- Three.js Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="app">
    <div id="overlay">
      <div class="top-panel">
        <h1>フォークリフト接触事故<br class="sp" />KY WebAR</h1>
        <p>
          スマートフォンを動かして周囲を認識し、画面をタップしてモデルを配置してください。
        </p>
      </div>

      <div id="status" class="status">
        AR開始後、床や机などに向けてスマホを動かしてください。
      </div>

      <div class="bottom-panel">
        <button id="btnPlay" type="button">アニメ再生</button>
        <button id="btnPause" type="button">一時停止</button>
        <button id="btnReset" type="button">最初から</button>
        <button id="btnScaleUp" type="button">拡大</button>
        <button id="btnScaleDown" type="button">縮小</button>
        <button id="btnRotate" type="button">回転</button>
      </div>

      <div class="notice">
        DEMO版 / 労災KY教材モデル
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
